experiment:
  name: proposed

seed: 42

model:
  name: simple_cnn
  num_classes: 10

data:
  dataset: cifar10
  num_clients: 500
  clients_per_round: 50
  batch_size: 32
  iid: false
  alpha: 0.5
  min_samples_per_client: 20
  split_max_attempts: 100
  data_dir: null

trainer:
  num_rounds: 100
  max_workers: 8
  num_workers: 0
  persistent_workers: false
  prefetch_factor: 2
  pin_memory: auto
  device: auto
  keep_client_model_on_device: true
  min_cuda_free_ratio: 0.15
  cuda_empty_cache_each_round: false
  cudnn_benchmark: true
  allow_tf32: true
  amp_enabled: auto
  amp_dtype: float16
  channels_last: true
  eval_batch_size: 512
  log_interval: 1
  save_interval: 10
  save_dir: ./checkpoints
  log_dir: ./logs

client:
  training_strategy: contrastive
  local_epochs: 5
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  alpha: 0.005
  beta: 0.005
  contrastive_margin: 1.0
  mu: 0.01
  sam_rho: 0.05
  sam_eps: 1.0e-12
  stat_type: l2_norm

compressor:
  type: topk
  importance_strategy: grad_normalized
  topk_strategy: weighted_layer_norm
  topk_ratio: 0.1
  layer_weight_method: mean
  use_residual: true

server:
  server_lr: 1.0
  aggregation_weight_strategy: data_size
  initial_clip: 1.0
  clip_update_method: adaptive
  target_quantile: 0.7
  clip_lr: 0.2
  ema_alpha: 0.8

dp:
  enabled: true
  epsilon_total: 8.0
  delta: 1.0e-5
  clip_count_noise_multiplier: 0.1
  use_heterogeneous_noise: true
  min_relative_noise: 0.3
  max_relative_noise: 3.0
  template_ema: 0.9
  use_global_importance_for_topk: true
  importance_aggregation: tempered_weighted
  importance_weight_beta: 0.5
  importance_normalization: mean
  global_local_mix_lambda: 0.4
  enable_importance_freeze: true
  importance_freeze_warmup_rounds: 10
  importance_freeze_threshold: 0.001
  importance_freeze_patience: 3
  local_importance_refresh_interval_after_freeze: 5
  client_noise_allocation: uniform
  client_variance_max_scale: 10.0
  account_for_topk_in_q: false
  rdp_orders: [2, 3, 4, 5, 8, 16, 32, 64, 128, 256]
  rdp_steps_per_round: 1
  trusted_server_for_stats: true

importance_viz:
  enabled: false
  interval: 10
  client_id: 0
  max_elements: 4096
